version: 2

models:
  - name: dim_company
    description: "Company dimension table — one row per ticker"
    columns:
      - name: ticker
        description: "Stock symbol — primary key"
        data_tests:
          - not_null
          - unique

      - name: company_name
        description: "Full company name"
        data_tests:
          - not_null

      - name: sector
        description: "Industry sector"
        data_tests:
          - not_null

      - name: market_cap_tier
        description: "Company size classification"
        data_tests:
          - not_null
          - accepted_values:
              values: ['Mega Cap', 'Large Cap', 'Mid Cap', 'Small Cap', 'Micro Cap']

  - name: fct_stock_prices
    description: "Daily stock prices fact table — incremental, append-only"
    columns:
      - name: ticker
        description: "Stock symbol"
        data_tests:
          - not_null

      - name: trade_date
        description: "Trading date"
        data_tests:
          - not_null

      - name: close_price
        description: "Closing price"
        data_tests:
          - not_null

      - name: daily_return_pct
        description: "Percentage price change from open to close"
        data_tests:
          - not_null

      - name: sector
        description: "Industry sector from dim_company"
        data_tests:
          - not_null

      - name: market_cap_tier
        description: "Company size classification from dim_company"
        data_tests:
          - not_null